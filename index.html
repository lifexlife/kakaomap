<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>카카오맵 엑셀 마커 V0.8</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --kakao: #FEE500; --kakao-dark: #3A1D1D;
      --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
      --border: rgba(255,255,255,0.08); --text: #f0ede8; --muted: #8b8a99;
    }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    header { display:flex; align-items:center; gap:14px; padding:0 20px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
    .logo-text { font-size:14px; font-weight:700; }
    .logo-text span { color:var(--kakao); }
    #api-key-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; padding:5px 10px; width:240px; outline:none; }
    #load-map-btn { background:var(--kakao); color:var(--kakao-dark); border:none; border-radius:6px; font-size:12px; font-weight:700; padding:5px 14px; cursor:pointer; }
    main { flex:1; display:flex; overflow:hidden; }
    aside { width:300px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .panel-section { padding:16px; border-bottom:1px solid var(--border); }
    .panel-title { font-size:11px; font-weight:700; color:var(--muted); margin-bottom:12px; text-transform:uppercase; }
    .upload-zone { border:1.5px dashed var(--border); border-radius:10px; padding:20px; text-align:center; cursor:pointer; }
    #file-input { display:none; }
    .mode-tab { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:12px; padding:6px; cursor:pointer; }
    .mode-tab.active { background:rgba(254,229,0,.15); border-color:var(--kakao); color:var(--kakao); }
    .mapping-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .mapping-row label { font-size:11px; color:var(--muted); width:40px; }
    .mapping-row select { flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-size:12px; padding:4px; border-radius:4px; }
    .apply-btn { width:100%; background:var(--kakao); color:var(--kakao-dark); border:none; border-radius:7px; font-size:13px; font-weight:700; padding:10px; cursor:pointer; margin-top:10px; }
    .geocode-progress { margin-top:10px; }
    .geocode-bar-wrap { height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
    .geocode-bar { height:100%; width:0%; background:var(--kakao); transition:width 0.2s; }
    .geocode-status { font-size:10px; color:var(--muted); margin-top:4px; }
    #map-wrap { flex:1; position:relative; }
    #map { width:100%; height:100%; }
    .marker-list { flex:1; overflow-y:auto; padding:8px; }
    .marker-item { display:flex; align-items:center; gap:10px; padding:8px; border-radius:6px; cursor:pointer; font-size:12px; margin-bottom:4px; }
    .marker-item:hover { background:var(--surface2); }
    .marker-num { width:20px; height:20px; border-radius:50%; background:var(--kakao); color:var(--kakao-dark); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:10px; }
    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); padding:10px 20px; border-radius:8px; z-index:1000; opacity:0; transition:0.3s; pointer-events:none; font-size:13px; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<header>
  <div class="logo-text"><span>kakao</span>map · 엑셀 마커</div>
  <div style="flex:1;"></div>
  <input type="text" id="api-key-input" placeholder="JavaScript 키를 입력하세요"/>
  <button id="load-map-btn" onclick="initMap()">지도 로드</button>
</header>

<main>
  <aside>
    <div class="panel-section">
      <div class="panel-title">파일 업로드</div>
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div id="file-name-text" style="font-size:12px; color:var(--muted);">CSV/XLSX 파일을 선택하세요</div>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
    </div>

    <div class="panel-section" id="mapping-section" style="display:none;">
      <div class="panel-title">컬럼 매핑</div>
      <div style="display:flex; gap:4px; margin-bottom:10px;">
        <button class="mode-tab active" id="tab-coords" onclick="switchMode('coords')">위도/경도</button>
        <button class="mode-tab" id="tab-addr" onclick="switchMode('addr')">주소</button>
      </div>
      <div class="mapping-row"><label>이름</label><select id="col-name"></select></div>
      <div id="mode-coords">
        <div class="mapping-row"><label>위도</label><select id="col-lat"></select></div>
        <div class="mapping-row"><label>경도</label><select id="col-lng"></select></div>
      </div>
      <div id="mode-addr" style="display:none;">
        <div class="mapping-row"><label>주소</label><select id="col-addr"></select></div>
        <div class="geocode-progress" id="geocode-progress" style="display:none;">
          <div class="geocode-bar-wrap"><div class="geocode-bar" id="geocode-bar"></div></div>
          <div class="geocode-status" id="geocode-status-el">대기 중...</div>
        </div>
      </div>
      <button class="apply-btn" onclick="applyMarkers()">마커 표시하기</button>
    </div>
    <div class="marker-list" id="marker-list"></div>
  </aside>

  <div id="map-wrap">
    <div id="map"></div>
  </div>
</main>

<div id="toast"></div>

<script>
let map = null, markers = [], infowindows = [], parsedData = [];
let geocodeResults = {}, geocoder = null, currentMode = 'coords';

function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.className='show'; setTimeout(()=>t.className='', 2000); }

function switchMode(m) {
  currentMode = m;
  document.getElementById('mode-coords').style.display = m==='coords'?'block':'none';
  document.getElementById('mode-addr').style.display = m==='addr'?'block':'none';
  document.getElementById('tab-coords').classList.toggle('active', m==='coords');
  document.getElementById('tab-addr').classList.toggle('active', m==='addr');
}

function initMap() {
  const key = document.getElementById('api-key-input').value.trim();
  if(!key) return toast('API 키를 입력하세요.');
  
  if (window.kakao && window.kakao.maps) {
    alert("이미 지도가 로드되었습니다. 페이지를 새로고침 후 다시 시도하세요.");
    return;
  }

  const s = document.createElement('script');
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&autoload=false&libraries=services,clusterer`;
  s.onload = () => kakao.maps.load(() => {
    map = new kakao.maps.Map(document.getElementById('map'), {center:new kakao.maps.LatLng(37.5665, 126.978), level:8});
    geocoder = new kakao.maps.services.Geocoder();
    toast('지도가 로드되었습니다.');
  });
  s.onerror = () => alert('카카오 API 로드 실패. [JavaScript 키]가 맞는지, 도메인이 등록되었는지 확인하세요.');
  document.head.appendChild(s);
}

document.getElementById('file-input').onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const data = new Uint8Array(ev.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    
    parsedData = json.slice(1).filter(r => r.join('').trim() !== '');
    const headers = json[0];
    ['col-name', 'col-lat', 'col-lng', 'col-addr'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = headers.map((h, i) => `<option value="${i}">${h || i}</option>`).join('');
    });

    const findIdx = (k) => headers.findIndex(h => h.includes(k));
    if(findIdx('명칭')!==-1) document.getElementById('col-name').value = findIdx('명칭');
    if(findIdx('도로명')!==-1) document.getElementById('col-addr').value = findIdx('도로명');
    
    document.getElementById('mapping-section').style.display = 'block';
    document.getElementById('file-name-text').textContent = file.name;
    toast('파일 수신 완료');
  };
  reader.readAsArrayBuffer(file);
};

async function startGeocoding() {
  const addrIdx = Number(document.getElementById('col-addr').value);
  const total = parsedData.length;
  let done = 0;
  geocodeResults = {};
  
  document.getElementById('geocode-progress').style.display = 'block';
  const bar = document.getElementById('geocode-bar');
  const statusEl = document.getElementById('geocode-status-el');

  for(let i=0; i<total; i++) {
    const addr = String(parsedData[i][addrIdx] || '').trim();
    if(!addr) { done++; continue; }

    await new Promise(res => {
      // 요청 간격을 100ms로 늘려 안정성 확보
      setTimeout(() => {
        geocoder.addressSearch(addr, (result, status) => {
          if(status === kakao.maps.services.Status.OK) {
            geocodeResults[i] = {y: result[0].y, x: result[0].x};
          } else {
            console.error(`검색 실패: ${addr} | 상태: ${status}`);
          }
          res();
        });
      }, 100);
    });
    done++;
    bar.style.width = (done/total*100) + '%';
    statusEl.textContent = `변환 중... (${done}/${total})`;
  }
  renderMarkers();
}

function renderMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = []; infowindows = [];
  const list = document.getElementById('marker-list');
  list.innerHTML = '';
  
  const nameIdx = Number(document.getElementById('col-name').value);
  const latIdx = Number(document.getElementById('col-lat').value);
  const lngIdx = Number(document.getElementById('col-lng').value);
  const bounds = new kakao.maps.LatLngBounds();
  let ok = 0;

  parsedData.forEach((row, i) => {
    let lat, lng;
    if(currentMode === 'addr') {
      if(!geocodeResults[i]) return;
      lat = geocodeResults[i].y; lng = geocodeResults[i].x;
    } else {
      lat = row[latIdx]; lng = row[lngIdx];
    }

    if(!lat || isNaN(lat)) return;

    const pos = new kakao.maps.LatLng(lat, lng);
    const m = new kakao.maps.Marker({position:pos, map:map});
    const name = row[nameIdx] || 'No Name';
    const iw = new kakao.maps.InfoWindow({content: `<div style="padding:5px; font-size:12px; color:#333;">${name}</div>`});
    
    kakao.maps.event.addListener(m, 'click', () => {
      infowindows.forEach(w => w.close());
      iw.open(map, m);
    });

    markers.push(m);
    infowindows.push(iw);
    bounds.extend(pos);
    ok++;

    const item = document.createElement('div');
    item.className = 'marker-item';
    item.innerHTML = `<div class="marker-num">${ok}</div><div>${name}</div>`;
    item.onclick = () => { map.panTo(pos); iw.open(map, m); };
    list.appendChild(item);
  });

  if(ok > 0) map.setBounds(bounds);
  toast(`${ok}개 마커 표시 완료`);
}

function applyMarkers() {
  if(currentMode === 'addr') startGeocoding();
  else renderMarkers();
}
</script>
</body>
</html>
